<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Artwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background: #050505; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .upload-card { background: #111; padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 500px; }
        .preview-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px dashed #333; border-radius: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: white; font-family: inherit; }
        button { width: 100%; padding: 15px; background: #00d4ff; color: black; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="upload-card">
    <h2 style="margin-top:0">Post New Artwork</h2>
    <div class="preview-box" id="preview-container">
        <span style="color:#555">Image Preview</span>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)">
    <input type="text" id="title" placeholder="Artwork Title">
    <textarea id="desc" rows="4" placeholder="Tell the story behind this piece..."></textarea>
    <button id="upload-btn" onclick="uploadArt()">Publish to Gallery</button>
    <a href="index.html" class="back-link">Cancel and go back</a>
</div>

<script>
    const SUPABASE_URL = 'https://zylksrieycibomgmdork.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bGtzcmlleWNpYm9tZ21kb3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTUxMjIsImV4cCI6MjA5MzU3MTEyMn0.TfiE4-D4UQWtN4fUkFYGlCsEMSK5S1Mcyrsfpip99BE';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function previewImage(event) {
        const file = event.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('preview-container').innerHTML = `<img src="${e.target.result}">`;
            };
            reader.readAsDataURL(file);
        }
    }

    async function uploadArt() {
        const { data: { user } } = await _supabase.auth.getUser();
        const file = document.getElementById('file-input').files[0];
        const title = document.getElementById('title').value;
        const desc = document.getElementById('desc').value;
        const btn = document.getElementById('upload-btn');

        if(!file || !title) return alert("Title and Image are required!");

        btn.innerText = "Uploading...";
        btn.disabled = true;

        const fileName = `${Date.now()}-${file.name}`;
        const { data: storageData, error: storageError } = await _supabase.storage.from('artworks').upload(fileName, file);

        if(storageError) { alert(storageError.message); btn.disabled = false; return; }

        const { data: { publicUrl } } = _supabase.storage.from('artworks').getPublicUrl(fileName);

        const { error: dbError } = await _supabase.from('posts').insert({
            user_id: user.id,
            title,
            description: desc,
            image_url: publicUrl
        });

        if(dbError) { alert(dbError.message); btn.disabled = false; }
        else { window.location.href = 'index.html'; }
    }
</script>
</body>
</html>
