<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtShare Pro | Creative Community</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #00d4ff;
            --gap: 20px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 50px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(0,0,0,0.9);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #222;
        }

        .nav-links { display: flex; align-items: center; }
        .nav-links button {
            background: none;
            border: none;
            color: white;
            margin-left: 15px;
            cursor: pointer;
            font-size: 0.95rem;
            opacity: 0.6;
            transition: 0.3s;
        }

        .nav-links button.active { opacity: 1; color: var(--accent); font-weight: bold; }
        .upload-btn { background: var(--accent) !important; color: black !important; padding: 8px 16px; border-radius: 6px; opacity: 1 !important; font-weight: bold; margin-left: 20px !important;}
        .upload-btn:hover { background: #00bfff !important; transform: scale(1.05); }

        /* Notification Dropdown Styles */
        .notif-container { position: relative; display: flex; align-items: center; margin-left: 15px; }
        .notif-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; position: relative; opacity: 0.8; transition: 0.2s; padding: 5px; }
        .notif-btn:hover { opacity: 1; transform: scale(1.1); }
        
        .badge {
            position: absolute; top: -2px; right: -5px;
            background: #ff3366; color: white; font-size: 0.65rem;
            padding: 2px 5px; border-radius: 10px; font-weight: bold;
            display: none; box-shadow: 0 0 5px rgba(255, 51, 102, 0.5);
        }

        .notif-panel {
            display: none; position: absolute; top: 45px; right: 0;
            width: 320px; background: var(--card-bg); border: 1px solid #333;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            z-index: 200; overflow: hidden;
        }
        
        .notif-panel.show { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .notif-header { padding: 15px; border-bottom: 1px solid #333; font-weight: bold; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .mark-all-btn { background: none; border: none; color: var(--accent); font-size: 0.8rem; cursor: pointer; }
        .mark-all-btn:hover { text-decoration: underline; }

        .notif-list { max-height: 350px; overflow-y: auto; }
        .notif-item { padding: 15px; border-bottom: 1px solid #222; font-size: 0.85rem; display: flex; gap: 12px; cursor: pointer; transition: 0.2s; }
        .notif-item:hover { background: #222; }
        .notif-item.unread { border-left: 3px solid var(--accent); background: rgba(0, 212, 255, 0.05); }
        .notif-icon { font-size: 1.2rem; }
        .notif-text { color: #ccc; line-height: 1.4; }
        .notif-time { font-size: 0.7rem; color: #666; margin-top: 4px; display: block; }

        /* Grid & Cards */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .section { display: none; }
        .section.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: var(--gap); }
        .art-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; }
        .art-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.1); }
        .art-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
        .art-info { padding: 15px; }
        .art-info h3 { margin: 0; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .art-info small { color: var(--accent); }

        /* Profile & Modals */
        .stats-bar { display: flex; justify-content: space-around; background: var(--card-bg); padding: 25px; border-radius: 15px; margin-bottom: 40px; border: 1px solid #222; }
        .stat-item { text-align: center; }
        .stat-item b { display: block; font-size: 1.6rem; color: var(--accent); }
        .stat-item label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; }
        
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .avatar-container { position: relative; width: 100px; height: 100px; border-radius: 50%; overflow: hidden; background: #333; border: 2px solid var(--accent); cursor: pointer; }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; font-size: 0.8rem; opacity: 0; transition: 0.3s; }
        .avatar-container:hover .avatar-overlay { opacity: 1; }
        #avatar-upload { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        
        .profile-info { flex: 1; }
        .edit-input { width: 100%; max-width: 300px; margin-bottom: 10px; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; }
        .edit-input:focus { outline: none; border-color: var(--accent); }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 40px; }
        .settings-box { display: flex; flex-direction: column; gap: 10px; }
        .settings-box h3 { margin: 0 0 10px 0; font-size: 1rem; border-bottom: 1px solid #444; padding-bottom: 5px; }

        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; width: 100%; }
        button.primary-btn { background: var(--accent); color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.primary-btn:hover { background: #00bfff; }
        button.danger-btn { background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); display: flex; max-width: 1000px; width: 100%; height: 80vh; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid #333; }
        .modal-img { flex: 1.4; background: #111; display: flex; align-items: center; justify-content: center; }
        .modal-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .modal-side { flex: 1; padding: 40px; display: flex; flex-direction: column; border-left: 1px solid #222; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 2.5rem; cursor: pointer; z-index: 10; color: #888; line-height: 1; }
        .action-btn { background: var(--accent); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: auto; transition: 0.2s; }
        .action-btn.liked { background: #ff3366; color: white; }

        /* Toast Notifications */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--accent); color: black; padding: 15px 25px; border-radius: 8px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 800px) {
            .modal-content { flex-direction: column; height: 95vh; overflow-y: auto; }
            .modal-img { height: 350px; flex: none; }
            .modal-side { padding: 20px; }
            .settings-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <h2 style="margin:0; color: var(--accent); letter-spacing: 1px;">ARTSHARE</h2>
    <div class="nav-links">
        <button id="btn-feed" class="active" onclick="showSection('feed')">Explore</button>
        <button id="btn-profile" onclick="showSection('profile')">Profile</button>
        
        <!-- Notification Bell & Dropdown -->
        <div class="notif-container" id="notif-wrapper">
            <button class="notif-btn" onclick="toggleNotifPanel()">
                🔔 <span id="notif-badge" class="badge"></span>
            </button>
            <div id="notif-panel" class="notif-panel">
                <div class="notif-header">
                    <span>Notifications</span>
                    <button class="mark-all-btn" onclick="markAllRead()">Mark all read</button>
                </div>
                <div id="notif-list" class="notif-list">
                    <!-- Notifications generated via JS -->
                </div>
            </div>
        </div>

        <button class="upload-btn" onclick="window.location.href='upload.html'">+ Post</button>
    </div>
</nav>

<div id="toast-container"></div>

<div class="container">
    <!-- FEED SECTION -->
    <div id="feed-section" class="section active">
        <header style="margin-bottom: 30px;"><h1>Explore Artworks</h1></header>
        <div id="art-grid" class="grid"><p id="status">Brushing the canvas...</p></div>
    </div>

    <!-- PROFILE SECTION -->
    <div id="profile-section" class="section">
        <div class="profile-header">
            <div class="avatar-container">
                <img id="profile-avatar" src="https://via.placeholder.com/100" alt="Avatar">
                <div class="avatar-overlay">Upload</div>
                <input type="file" id="avatar-upload" accept="image/*" onchange="uploadAvatar(event)">
            </div>
            <div class="profile-info">
                <input type="text" id="edit-username" class="edit-input" placeholder="Your Username">
                <p id="userEmail" style="opacity: 0.5; margin: 0;"></p>
            </div>
            <button class="primary-btn" id="saveProfileBtn" onclick="saveProfile()">Save Profile</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item"><b id="stat-arts">0</b><label>Arts</label></div>
            <div class="stat-item"><b id="stat-followers">0</b><label>Followers</label></div>
            <div class="stat-item"><b id="stat-following">0</b><label>Following</label></div>
            <div class="stat-item"><b id="stat-likes">0</b><label>Total Likes</label></div>
        </div>

        <div class="settings-grid">
            <div class="settings-box">
                <h3>Change Password</h3>
                <input type="password" id="currentPass" placeholder="Current Password">
                <input type="password" id="newPass" placeholder="New Password">
                <input type="password" id="confirmPass" placeholder="Confirm New Password">
                <button class="primary-btn" onclick="changePass()">Update Password</button>
            </div>
            <div class="settings-box">
                <h3>Danger Zone</h3>
                <p style="font-size: 0.9rem; opacity: 0.7;">Ready to leave? This will securely log you out of ArtShare Pro.</p>
                <button class="danger-btn" onclick="logout()" style="margin-top: auto;">Log Out Securely</button>
            </div>
        </div>

        <h3 style="border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px;">Your Gallery</h3>
        <div id="user-art-grid" class="grid"></div>
    </div>
</div>

<!-- MODAL SYSTEM -->
<div id="artModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-img"><img id="m-img" src=""></div>
        <div class="modal-side">
            <h2 id="m-title" style="margin:0 0 5px 0;">Artwork Title</h2>
            <p style="margin:0 0 20px 0;">by <b id="m-author" style="color:var(--accent)">@artist</b></p>
            <div style="margin-bottom: 20px;">
                <b id="m-likes" style="font-size: 1.4rem;">0</b> <span style="opacity:0.5; font-size:0.9rem;">Likes</span>
            </div>
            <p id="m-desc" style="line-height:1.6; opacity:0.8; font-size:0.95rem; overflow-y: auto; max-height: 200px;"></p>
            <button id="likeBtn" class="action-btn" onclick="toggleLike()">❤️ Like Artwork</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://zylksrieycibomgmdork.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bGtzcmlleWNpYm9tZ21kb3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTUxMjIsImV4cCI6MjA5MzU3MTEyMn0.TfiE4-D4UQWtN4fUkFYGlCsEMSK5S1Mcyrsfpip99BE';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentPost = null;
    let currentUser = null;
    let currentUserProfile = null;
    let allPosts = []; 
    let userPosts = [];
    const likedPosts = new Set();

    // REAL-TIME Notification State
    let notifications = [];

    async function init() {
        const { data: { user }, error } = await _supabase.auth.getUser();
        if (error || !user) return window.location.href = "auth.html"; 
        
        currentUser = user;
        
        const { data: prof } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
        currentUserProfile = prof || { username: 'Someone' };

        await fetchNotifications(); // Load database notifications
        subscribeToNotifications(); // Listen for Realtime inserts
        initFeed();
    }

    // ==========================================
    // REAL-TIME NOTIFICATION SYSTEM (SUPABASE)
    // ==========================================

    async function fetchNotifications() {
        try {
            const { data, error } = await _supabase
                .from('notifications')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false })
                .limit(20);

            if (error) throw error;

            if (data) {
                notifications = data;
                updateNotifUI();
            }
        } catch (error) {
            console.error("Notifications table missing or error:", error.message);
        }
    }

    function subscribeToNotifications() {
        _supabase.channel('custom-insert-channel')
            .on(
                'postgres_changes',
                { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${currentUser.id}` },
                (payload) => {
                    const newNotif = payload.new;
                    notifications.unshift(newNotif);
                    
                    if (notifications.length > 20) notifications.pop();
                    
                    updateNotifUI();
                    
                    // Show live toast for new real-time notification
                    const icon = newNotif.type === 'like' ? '❤️' : '🔔';
                    showToast(`${icon} ${newNotif.message}`);
                }
            )
            .subscribe();
    }

    function formatTime(timestamp) {
        return new Date(timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    function updateNotifUI() {
        const badge = document.getElementById('notif-badge');
        const list = document.getElementById('notif-list');
        
        const unreadCount = notifications.filter(n => !n.is_read).length;

        // Update Badge
        if (unreadCount > 0) {
            badge.style.display = 'inline-block';
            badge.innerText = `+${unreadCount}`;
        } else {
            badge.style.display = 'none';
        }

        // Render List
        if (notifications.length === 0) {
            list.innerHTML = `<div style="padding: 20px; text-align: center; color: #666; font-size: 0.85rem;">You're all caught up!</div>`;
            return;
        }

        list.innerHTML = notifications.map((n, index) => {
            const icon = n.type === 'like' ? '❤️' : '🔔';
            return `
            <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="markAsRead(${index})">
                <div class="notif-icon">${icon}</div>
                <div>
                    <span class="notif-text">${n.message}</span>
                    <span class="notif-time">${formatTime(n.created_at)}</span>
                </div>
            </div>
            `;
        }).join('');
    }

    function toggleNotifPanel() {
        document.getElementById('notif-panel').classList.toggle('show');
    }

    async function markAsRead(index) {
        if (!notifications[index].is_read) {
            notifications[index].is_read = true;
            updateNotifUI(); // Optimistic UI update
            
            // Database update
            await _supabase.from('notifications')
                .update({ is_read: true })
                .eq('id', notifications[index].id);
        }
    }

    async function markAllRead() {
        notifications.forEach(n => n.is_read = true);
        updateNotifUI(); // Optimistic UI update

        // Database update
        await _supabase.from('notifications')
            .update({ is_read: true })
            .eq('user_id', currentUser.id)
            .eq('is_read', false);
    }

    // Close notification panel when clicking outside
    document.addEventListener('click', (e) => {
        const wrapper = document.getElementById('notif-wrapper');
        const panel = document.getElementById('notif-panel');
        if (wrapper && !wrapper.contains(e.target)) {
            panel.classList.remove('show');
        }
    });

    // ==========================================
    // STANDARD APP FUNCTIONS
    // ==========================================

    function showToast(message) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function showSection(section) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-links button.active').forEach(b => b.classList.remove('active'));
        document.getElementById(section + '-section').classList.add('active');
        document.getElementById('btn-' + section).classList.add('active');
        if (section === 'feed') initFeed();
        if (section === 'profile') loadProfile();
    }

    async function initFeed() {
        const { data: posts, error } = await _supabase.from('posts').select(`*, profiles(username)`).order('created_at', { ascending: false });
        if (error) return document.getElementById('status').innerText = "Failed to load feed.";
        allPosts = posts || [];
        renderGrid('art-grid', allPosts);
    }

    function renderGrid(containerId, postsArray) {
        const grid = document.getElementById(containerId);
        grid.innerHTML = postsArray.length ? "" : "<p style='grid-column: 1/-1; opacity: 0.6;'>No artworks found.</p>";

        postsArray.forEach(post => {
            const card = document.createElement('div');
            card.className = "art-card";
            card.innerHTML = `
                <img src="${post.image_url}" alt="Artwork">
                <div class="art-info">
                    <h3>${post.title}</h3>
                    <small>@${post.profiles?.username || 'artist'}</small>
                </div>
            `;
            card.onclick = () => openModal(post.id); 
            grid.appendChild(card);
        });
    }

    async function toggleLike() {
        if (!currentPost || !currentUser) return;
        
        const btn = document.getElementById('likeBtn');
        btn.disabled = true;

        const isCurrentlyLiked = likedPosts.has(currentPost.id);
        const newLikes = isCurrentlyLiked ? Math.max(0, (currentPost.likes_count || 0) - 1) : (currentPost.likes_count || 0) + 1;
        
        try {
            const { error: postError } = await _supabase.from('posts').update({ 
                likes_count: newLikes
            }).eq('id', currentPost.id);
            
            if (postError) throw postError;

            // Give the author a +1 to their total likes
            const { data: pubProf } = await _supabase.from('profiles').select('total_likes').eq('id', currentPost.user_id).single();
            if (pubProf) {
                const authorNewLikes = isCurrentlyLiked ? Math.max(0, (pubProf.total_likes || 0) - 1) : (pubProf.total_likes || 0) + 1;
                await _supabase.from('profiles').update({ total_likes: authorNewLikes }).eq('id', currentPost.user_id);
            }

            // INSERT REAL NOTIFICATION INTO DATABASE (If Liking & Not self-liking)
            if (!isCurrentlyLiked && currentPost.user_id !== currentUser.id) {
                _supabase.from('notifications').insert({
                    user_id: currentPost.user_id,
                    actor_name: currentUserProfile.username,
                    type: 'like',
                    message: `@${currentUserProfile.username} liked your artwork: "${currentPost.title}"`,
                    is_read: false
                }).then(({error}) => { if(error) console.error("Notif Error:", error) });
            }

            currentPost.likes_count = newLikes;
            
            if (isCurrentlyLiked) {
                likedPosts.delete(currentPost.id);
                btn.innerText = "❤️ Like Artwork";
                btn.classList.remove('liked');
            } else {
                likedPosts.add(currentPost.id);
                btn.innerText = "💔 Unlike";
                btn.classList.add('liked');
            }

            document.getElementById('m-likes').innerText = newLikes;
            btn.disabled = false;

            const exploreIdx = allPosts.findIndex(p => p.id === currentPost.id);
            if(exploreIdx !== -1) allPosts[exploreIdx].likes_count = newLikes;

        } catch (e) {
            console.error(e);
            alert("Error updating like status.");
            btn.disabled = false;
        }
    }

    function openModal(postId) {
        currentPost = allPosts.find(p => p.id === postId) || userPosts.find(p => p.id === postId);
        if(!currentPost) return;

        document.getElementById('m-img').src = currentPost.image_url;
        document.getElementById('m-title').innerText = currentPost.title;
        document.getElementById('m-author').innerText = "@" + (currentPost.profiles?.username || 'artist');
        document.getElementById('m-desc').innerText = currentPost.description || "No description provided.";
        document.getElementById('m-likes').innerText = currentPost.likes_count || 0;
        
        const lBtn = document.getElementById('likeBtn');
        lBtn.disabled = false;
        
        if (likedPosts.has(currentPost.id)) {
            lBtn.innerText = "💔 Unlike";
            lBtn.classList.add('liked');
        } else {
            lBtn.innerText = "❤️ Like Artwork";
            lBtn.classList.remove('liked');
        }

        document.getElementById('artModal').style.display = "flex";
    }

    function closeModal() { document.getElementById('artModal').style.display = 'none'; }

    async function loadProfile() {
        document.getElementById('userEmail').innerText = currentUser.email;
        
        const { data: profile } = await _supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        if (profile) {
            document.getElementById('edit-username').value = profile.username || '';
            if(profile.avatar_url) document.getElementById('profile-avatar').src = profile.avatar_url;
            
            document.getElementById('stat-followers').innerText = profile.followers_count || 0;
            document.getElementById('stat-following').innerText = profile.following_count || 0;
            document.getElementById('stat-likes').innerText = profile.total_likes || 0;
        }

        const { data: posts } = await _supabase.from('posts').select(`*, profiles(username)`).eq('user_id', currentUser.id).order('created_at', { ascending: false });
        userPosts = posts || [];
        document.getElementById('stat-arts').innerText = userPosts.length;
        renderGrid('user-art-grid', userPosts);
    }

    async function uploadAvatar(event) {
        const file = event.target.files[0];
        if (!file) return;

        const fileExt = file.name.split('.').pop();
        const fileName = `${currentUser.id}-avatar.${fileExt}`; 

        document.getElementById('profile-avatar').style.opacity = '0.5';

        const { data, error } = await _supabase.storage
            .from('avatars')
            .upload(fileName, file, { cacheControl: '3600', upsert: true });

        if (error) {
            console.error("Upload Error:", error);
            document.getElementById('profile-avatar').style.opacity = '1';
            
            if (error.message.includes('row-level security') || error.message.includes('violate')) {
                alert("Upload Blocked: You must run the SQL code in your Supabase Dashboard to allow Storage uploads (RLS).");
            } else {
                alert("Failed to upload image: " + error.message);
            }
            return;
        }

        const { data: urlData } = _supabase.storage.from('avatars').getPublicUrl(fileName);
        await _supabase.from('profiles').update({ avatar_url: urlData.publicUrl }).eq('id', currentUser.id);
        
        document.getElementById('profile-avatar').src = urlData.publicUrl;
        document.getElementById('profile-avatar').style.opacity = '1';
        showToast("Profile picture updated!");
    }

    async function saveProfile() {
        const newName = document.getElementById('edit-username').value.trim();
        if(!newName) return alert("Username cannot be empty");

        const btn = document.getElementById('saveProfileBtn');
        btn.innerText = "Saving...";
        
        const { error } = await _supabase.from('profiles').update({ username: newName }).eq('id', currentUser.id);
        
        btn.innerText = "Save Profile";
        if(error) return alert(error.message);
        
        currentUserProfile.username = newName;
        showToast("Profile updated!");
    }

    async function changePass() {
        const currentPass = document.getElementById('currentPass').value;
        const newPass = document.getElementById('newPass').value;
        const confirmPass = document.getElementById('confirmPass').value;

        if (!currentPass) return alert("Please enter your current password.");
        if (newPass.length < 6) return alert("New password must be at least 6 characters.");
        if (newPass !== confirmPass) return alert("New passwords do not match!");

        const { error: signInError } = await _supabase.auth.signInWithPassword({ email: currentUser.email, password: currentPass });
        if (signInError) return alert("Incorrect Current Password!");

        const { error: updateError } = await _supabase.auth.updateUser({ password: newPass });
        if (updateError) {
            alert("Error: " + updateError.message);
        } else {
            showToast("Password updated successfully!");
            document.getElementById('currentPass').value = '';
            document.getElementById('newPass').value = '';
            document.getElementById('confirmPass').value = '';
        }
    }

    async function logout() { await _supabase.auth.signOut(); window.location.href = "auth.html"; }
    window.onclick = (e) => { if(e.target.className === 'modal') closeModal(); }
    
    init();
</script>
</body>
</html>
